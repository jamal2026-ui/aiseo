<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private AI Writer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .editor-box { background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 25px; margin-top: 30px; }
        #output { background: #fff; border: 1px solid #ddd; padding: 20px; min-height: 400px; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="editor-box">
        <h3 class="mb-4 text-primary">AI Article Generator 1500+ Kata</h3>
        <div class="mb-3">
            <label class="form-label">Judul Artikel</label>
            <input type="text" id="title" class="form-control" placeholder="Masukkan judul yang menarik...">
        </div>
        <div class="mb-3">
            <label class="form-label">Keywords</label>
            <input type="text" id="keywords" class="form-control" placeholder="Contoh: seo murah, jasa backlink, dll">
        </div>
        <button id="btnGen" onclick="startGenerate()" class="btn btn-success w-100">Buat Artikel Sekarang</button>
        
        <div id="loading" class="text-center mt-3" style="display:none;">
            <div class="spinner-border text-success"></div>
            <p>Sabar ya, AI sedang menulis artikel panjang untukmu...</p>
        </div>

        <div id="output" class="content-result">
            Hasil artikel akan muncul di sini dan bisa langsung di-copy ke blog.
        </div>
    </div>
</div>

<script>
async function startGenerate() {
    const title = document.getElementById('title').value;
    const keywords = document.getElementById('keywords').value;
    const btn = document.getElementById('btnGen');
    const loading = document.getElementById('loading');

    if(!title) return alert("Isi judul dulu bos!");

    btn.disabled = true;
    loading.style.display = 'block';

    const res = await fetch('/write', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title, keywords})
    });

    const data = await res.json();
    loading.style.display = 'none';
    btn.disabled = false;

    if(data.status === "success") {
        document.getElementById('output').innerHTML = data.content;
    } else {
        alert("Waduh, ada error: " + data.message);
    }
}
</script>
</body>
</html>
